name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx turbo lint

      - name: Test
        run: npm run test --workspace=apps/web

      - name: Build
        run: npx turbo build
        env:
          COOKIE_SECRET: ci-test-secret
          ADMIN_EMAILS: test@test.com
